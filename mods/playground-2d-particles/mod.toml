id = "playground-2d-particles"
name = "Playground 2D Particles"
version = "0.1.0"
description = "Developer playground for ParticleEmitter2D presets, curves, and runtime editing."
authors = ["Amigo Engine Team"]
dependencies = ["core"]
capabilities = ["rendering_2d", "particles_2d", "screen_space_ui"]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "menu"
label = "Particles Menu"
description = "Entry menu for the 2D particles playground."
path = "scenes/menu"
launcher_visible = true

[[scenes]]
id = "showcase"
label = "Particle Showcase"
description = "Gallery of ParticleEmitter2D presets driven by Value Curves."
path = "scenes/showcase"
launcher_visible = true

[[scenes]]
id = "editor"
label = "Particle Editor v0"
description = "Basic runtime editor for ParticleEmitter2D parameters."
path = "scenes/editor"
launcher_visible = true
