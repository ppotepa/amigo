version: 1
scene:
  id: showcase
  label: Particle Showcase
  description: Gallery of generic ParticleEmitter2D presets.

entities:
  - id: controls
    name: playground-2d-particles-showcase-controls
    components:
      - type: InputActionMap
        id: showcase
        active: true
        actions:
          ui.back:
            kind: button
            pressed: [Escape]
          showcase.select_fire:
            kind: button
            pressed: ["1"]
          showcase.select_smoke:
            kind: button
            pressed: ["2"]
          showcase.select_sparks:
            kind: button
            pressed: ["3"]
          showcase.select_magic:
            kind: button
            pressed: ["4"]
          showcase.select_snow:
            kind: button
            pressed: ["5"]
          showcase.select_dust:
            kind: button
            pressed: ["6"]
          showcase.select_engine_plume:
            kind: button
            pressed: ["7"]
          showcase.select_plasma:
            kind: button
            pressed: ["8"]
          showcase.select_portal:
            kind: button
            pressed: ["9"]
          showcase.select_explosion:
            kind: button
            pressed: ["0"]
          showcase.toggle_selected:
            kind: button
            pressed: [Space]
          showcase.start_all:
            kind: button
            pressed: [A]
          showcase.stop_all:
            kind: button
            pressed: [S]
          showcase.reset:
            kind: button
            pressed: [R]
          showcase.burst:
            kind: button
            pressed: [B]
      - type: EventPipeline
        id: back-to-menu
        topic: playground-2d-particles.menu
        steps:
          - kind: transition_scene
            scene: menu
      - type: Behavior
        kind: scene_back_controller
        action: ui.back
        scene: menu

  - id: camera
    name: playground-2d-particles-showcase-camera
    components:
      - type: Camera2D

  - id: backdrop
    name: playground-2d-particles-showcase-backdrop
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2400.0, y: -2400.0 }
          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#03050DFF"
        z_index: -100.0

  - id: preview-emitter
    name: playground-2d-particles-preview-emitter
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 18.0
        segments: 24
        stroke_color: "#39D7FFAA"
        stroke_width: 2.0
        fill_color: "#39D7FF18"
        z_index: 6.0
      - type: ParticleEmitter2D
        local_direction_degrees: -90.0
        active: false
        spawn_rate: 1.0
        max_particles: 1
        particle_lifetime: 0.1
        initial_speed: 0.0
        initial_size: 1.0
        final_size: 1.0
        color: "#FFFFFFFF"
        z_index: 30.0
        shape: { kind: circle, segments: 8 }

  - id: preview-bg
    name: playground-2d-particles-preview-bg
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#07111FCC"
        z_index: 1.0

  - id: preview-grid-v-left
    name: playground-2d-particles-preview-grid-v-left
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -130.0, y: -260.0 }
          - { x: -130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-center
    name: playground-2d-particles-preview-grid-v-center
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 0.0, y: -260.0 }
          - { x: 0.0, y: 260.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-right
    name: playground-2d-particles-preview-grid-v-right
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 130.0, y: -260.0 }
          - { x: 130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-top
    name: playground-2d-particles-preview-grid-h-top
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: -130.0 }
          - { x: 260.0, y: -130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-center
    name: playground-2d-particles-preview-grid-h-center
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 0.0 }
          - { x: 260.0, y: 0.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-bottom
    name: playground-2d-particles-preview-grid-h-bottom
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 130.0 }
          - { x: 260.0, y: 130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-frame
    name: playground-2d-particles-preview-frame
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: true
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#39D7FFFF"
        stroke_width: 2.0
        z_index: 3.0

  - id: preview-center
    name: playground-2d-particles-preview-center
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -16.0, y: 0.0 }
          - { x: 16.0, y: 0.0 }
        stroke_color: "#EAF6FF99"
        stroke_width: 1.4
        z_index: 4.0
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 0.0, y: -16.0 }
          - { x: 0.0, y: 16.0 }
        stroke_color: "#EAF6FF99"
        stroke_width: 1.4
        z_index: 4.0

  - id: themes
    name: playground-2d-particles-showcase-themes
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiThemeSet
        active: space_dark
        themes:
          - id: space_dark
            palette:
              background: "#050812FF"
              surface: "#101827EE"
              surface_alt: "#172033EE"
              text: "#EAF6FFFF"
              text_muted: "#89A2B7FF"
              border: "#2A6F9EFF"
              accent: "#39D7FFFF"
              accent_text: "#001018FF"
              danger: "#FF4D6DFF"
              warning: "#FFB000FF"
              success: "#5CFF9CFF"

  - id: ui
    name: playground-2d-particles-showcase-ui
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiModelBindings
        bindings:
          - path: playground-2d-particles-showcase-ui.root
            state: active_theme
            kind: theme
          - path: playground-2d-particles-showcase-ui.root.top.selected
            state: selected_preset_label
            kind: text
          - path: playground-2d-particles-showcase-ui.root.body.side.preset-options
            state: preset_options
            kind: options
          - path: playground-2d-particles-showcase-ui.root.body.side.preset-options
            state: selected_preset
            kind: selected
          - path: playground-2d-particles-showcase-ui.root.body.side.intensity-slider
            state: intensity
            kind: value
          - path: playground-2d-particles-showcase-ui.root.body.side.intensity-value
            state: intensity_label
            kind: text
          - path: playground-2d-particles-showcase-ui.root.body.side.current-detail
            state: current_preset_detail
            kind: text
      - type: UiDocument
        target:
          type: screen-space
          layer: hud
          viewport:
            width: 1440.0
            height: 900.0
            scaling: fit
        root:
          type: column
          id: root
          style_class: root
          style:
            left: 0.0
            top: 0.0
            width: 1440.0
            height: 900.0
            padding: 0.0
            gap: 0.0
            background: "#00000000"
          children:
            - type: row
              id: top
              style_class: top_bar
              style:
                left: 24.0
                top: 18.0
                width: 1392.0
                height: 72.0
                gap: 14.0
              children:
                - type: text
                  id: title
                  text: "PARTICLE SHOWCASE"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_title
                  style: { width: 410.0, height: 34.0, font_size: 28.0 }
                - type: text
                  id: selected
                  text: "Selected: fire"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_body
                  style: { width: 320.0, height: 28.0 }
                - type: text
                  id: preview-label
                  text: "520x520 centered preview grid"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_muted
                  style: { width: 260.0, height: 24.0 }
                - type: button
                  id: back
                  text: "Menu"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: button_secondary
                  style: { width: 110.0, height: 36.0 }
                  on_click: { event: playground-2d-particles.menu }

            - type: row
              id: body
              style:
                left: 0.0
                top: 18.0
                width: 1440.0
                height: 700.0
                gap: 0.0
              children:
                - type: spacer
                  id: body-left
                  style:
                    width: 1100.0
                    height: 700.0
                - type: column
                  id: side
                  style_class: panel
                  style: { width: 300.0, height: 640.0, padding: 18.0, gap: 14.0, background: "#101827EE" }
                  children:
                    - type: text
                      id: presets-title
                      text: "Presets"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_title
                      style: { width: 250.0, height: 30.0, font_size: 22.0 }
                    - type: dropdown
                      id: preset-options
                      selected: "fire"
                      options: ["fire"]
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: dropdown
                      style: { width: 250.0, height: 38.0 }
                      on_change: { event: playground-2d-particles.showcase.select }
                    - type: text
                      id: preset-help
                      text: "Dropdown is registry-driven and scrolls through the full catalog."
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_muted
                      style: { width: 250.0, height: 42.0, word_wrap: true }
                    - type: text
                      id: intensity-title
                      text: "Intensity"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_title
                      style: { width: 250.0, height: 30.0, font_size: 22.0 }
                    - type: slider
                      id: intensity-slider
                      value: 1.0
                      min: 0.0
                      max: 1.0
                      step: 0.01
                      style_class: slider
                      style: { width: 250.0, height: 28.0 }
                      on_change: { event: playground-2d-particles.showcase.intensity }
                    - type: text
                      id: intensity-value
                      text: "Intensity 100%"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_body
                      style: { width: 250.0, height: 28.0 }
                    - type: text
                      id: current-title
                      text: "Current Preset"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_title
                      style: { width: 250.0, height: 30.0, font_size: 22.0 }
                    - type: text
                      id: current-detail
                      text: "Active emitter is locked to grid center."
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_muted
                      style: { width: 250.0, height: 72.0, word_wrap: true }
                    - type: row
                      id: actions
                      style:
                        width: 250.0
                        height: 42.0
                        gap: 8.0
                      children:
                        - type: button
                          id: start
                          text: "Start"
                          font: playground-2d-particles/fonts/debug-ui
                          style_class: button_primary
                          style: { width: 76.0, height: 36.0 }
                          on_click: { event: playground-2d-particles.showcase.start-all }
                        - type: button
                          id: stop
                          text: "Stop"
                          font: playground-2d-particles/fonts/debug-ui
                          style_class: button_secondary
                          style: { width: 76.0, height: 36.0 }
                          on_click: { event: playground-2d-particles.showcase.stop-all }
                        - type: button
                          id: reset
                          text: "Reset"
                          font: playground-2d-particles/fonts/debug-ui
                          style_class: button_secondary
                          style: { width: 76.0, height: 36.0 }
                          on_click: { event: playground-2d-particles.showcase.intensity-reset }
            - type: row
              id: bottom
              style_class: bottom_bar
              style: { left: 24.0, top: 26.0, width: 1392.0, height: 48.0 }
              children:
                - type: text
                  id: hint
                  text: "Dropdown: 30 presets | 1-0 quick select basics | Space toggle | B burst | R reset | Esc menu"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_muted
                  style: { width: 1160.0, height: 28.0 }
