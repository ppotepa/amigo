version: 1
scene:
  id: showcase
  label: Particle Showcase
  description: Gallery of generic ParticleEmitter2D presets.

entities:
  - id: camera
    name: playground-2d-particles-showcase-camera
    components:
      - type: Camera2D

  - id: backdrop
    name: playground-2d-particles-showcase-backdrop
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2400.0, y: -2400.0 }
          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#03050DFF"
        z_index: -100.0

  - id: fire-emitter
    name: playground-2d-particles-fire-emitter
    transform2:
      translation: { x: -260.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 18.0
        segments: 24
        stroke_color: "#FF8A22AA"
        stroke_width: 2.0
        fill_color: "#FF8A2218"
        z_index: 5.0
      - type: ParticleEmitter2D
        local_direction_degrees: -90.0
        active: true
        spawn_rate: 120.0
        max_particles: 120
        particle_lifetime: 0.55
        lifetime_jitter: 0.15
        initial_speed: 80.0
        speed_jitter: 35.0
        spread_degrees: 32.0
        initial_size: 7.0
        final_size: 22.0
        color: "#FF8A22DD"
        color_ramp:
          interpolation: linear_rgb
          stops:
            - { t: 0.0, color: "#FFFFFFFF" }
            - { t: 0.18, color: "#FFE680FF" }
            - { t: 0.62, color: "#FF8A22CC" }
            - { t: 1.0, color: "#5A120000" }
        z_index: 20.0
        shape: { kind: circle, segments: 8 }
        emission_rate_curve: { kind: constant, value: 1.0 }
        size_curve: { kind: ease_out }
        alpha_curve:
          kind: custom
          points:
            - { t: 0.0, value: 0.95 }
            - { t: 0.5, value: 0.60 }
            - { t: 1.0, value: 0.0 }
        speed_curve: { kind: ease_out }
        forces:
