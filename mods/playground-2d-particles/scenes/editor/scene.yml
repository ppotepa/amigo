version: 1
scene:
  id: editor
  label: Particle Editor v0
  description: Runtime ParticleEmitter2D parameter editing with first UI controls.

entities:
  - id: camera
    name: playground-2d-particles-editor-camera
    components:
      - type: Camera2D

  - id: backdrop
    name: playground-2d-particles-editor-backdrop
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2400.0, y: -2400.0 }
          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#050812FF"
        z_index: -100.0

  - id: preview-emitter
    name: playground-2d-particles-editor-preview-emitter
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 22.0
        segments: 24
        stroke_color: "#39D7FFFF"
        stroke_width: 2.0
        fill_color: "#39D7FF18"
        z_index: 5.0
      - type: ParticleEmitter2D
        local_direction_degrees: -90.0
        active: true
        spawn_rate: 90.0
        max_particles: 128
        particle_lifetime: 0.65
        lifetime_jitter: 0.12
        initial_speed: 100.0
        speed_jitter: 36.0
        spread_degrees: 28.0
        initial_size: 7.0
        final_size: 22.0
        color: "#39D7FFFF"
        color_ramp:
          interpolation: linear_rgb
          stops:
            - { t: 0.0, color: "#FFFFFFFF" }
            - { t: 0.45, color: "#39D7FFFF" }
            - { t: 1.0, color: "#39D7FF00" }
        spawn_area:
          kind: circle
          radius: 8.0
        forces:
          - kind: drag
            coefficient: 0.4
        z_index: 24.0
        shape: { kind: circle, segments: 8 }
        emission_rate_curve: { kind: ease_out }
        size_curve: { kind: ease_out }
        alpha_curve:
          kind: custom
          points:
            - { t: 0.0, value: 0.95 }
            - { t: 0.65, value: 0.55 }
            - { t: 1.0, value: 0.0 }
        speed_curve: { kind: ease_out }

  - id: preview-bg
    name: playground-2d-particles-editor-preview-bg
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#07111FCC"
        z_index: 1.0

  - id: preview-grid-v-left
    name: playground-2d-particles-editor-preview-grid-v-left
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -130.0, y: -260.0 }
          - { x: -130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-center
    name: playground-2d-particles-editor-preview-grid-v-center
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 0.0, y: -260.0 }
          - { x: 0.0, y: 260.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-right
    name: playground-2d-particles-editor-preview-grid-v-right
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 130.0, y: -260.0 }
          - { x: 130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-top
    name: playground-2d-particles-editor-preview-grid-h-top
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: -130.0 }
          - { x: 260.0, y: -130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-center
    name: playground-2d-particles-editor-preview-grid-h-center
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 0.0 }
          - { x: 260.0, y: 0.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-bottom
    name: playground-2d-particles-editor-preview-grid-h-bottom
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 130.0 }
          - { x: 260.0, y: 130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-frame
    name: playground-2d-particles-editor-preview-frame
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: true
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#39D7FFFF"
        stroke_width: 2.0
        z_index: 3.0

  - id: themes
    name: playground-2d-particles-editor-themes
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiThemeSet
        active: space_dark
        themes:
          - id: space_dark
            palette:
              background: "#050812FF"
              surface: "#101827EE"
              surface_alt: "#172033EE"
              text: "#EAF6FFFF"
              text_muted: "#89A2B7FF"
              border: "#2A6F9EFF"
              accent: "#39D7FFFF"
              accent_text: "#001018FF"
              danger: "#FF4D6DFF"
              warning: "#FFB000FF"
              success: "#5CFF9CFF"

  - id: ui
    name: playground-2d-particles-editor-ui
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: hud
          viewport:
            width: 1440.0
            height: 900.0
            scaling: fit
        root:
          type: column
          id: root
          style_class: root
          style:
            left: 0.0
            top: 0.0
            width: 1440.0
            height: 900.0
            padding: 0.0
            gap: 0.0
            background: "#00000000"
          children:
            - type: row
              id: top
              style_class: top_bar
              style: { left: 24.0, top: 18.0, width: 1392.0, height: 72.0, gap: 14.0 }
              children:
                - type: text
                  id: title
                  text: "PARTICLE EDITOR V0"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_title
                  style: { width: 420.0, height: 34.0, font_size: 28.0 }
                - type: text
                  id: status
                  text: "Editing preview-emitter"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_body
                  style: { width: 520.0, height: 28.0 }
                - type: button
                  id: menu
                  text: "Menu"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: button_secondary
                  style: { width: 110.0, height: 36.0 }
                  on_click: { event: playground-2d-particles.menu }

            - type: row
              id: main
              style: { left: 0.0, top: 18.0, width: 1440.0, height: 700.0, gap: 0.0 }
              children:
                - type: spacer
                  id: world-preview-space
                  style:
                    width: 790.0
                    height: 700.0
                - type: column
                  id: controls
                  style_class: panel
                  style: { width: 590.0, height: 700.0, padding: 18.0, gap: 10.0, background: "#101827EE" }
                  children:
                    - type: text
                      id: preview-label
                      text: "World preview: 400x400 grid on the left"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_body
                      style: { width: 540.0, height: 24.0 }
                    - type: option-set
                      id: tabs
                      selected: "Emission"
                      options: ["Emission", "Color", "Size", "Motion", "Forces", "Spawn", "Burst", "Export"]
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: option_set
                      style: { width: 540.0, height: 82.0 }
                      on_change: { event: playground-2d-particles.editor.tab }
                    - type: text
                      id: tab-title
                      text: "Emission controls"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_title
                      style: { width: 540.0, height: 28.0, font_size: 20.0 }
                    - type: stack
                      id: tab-panels
                      style: { width: 540.0, height: 500.0 }
                      children:
                        - type: column
                          id: emission-panel
                          style: { width: 540.0, height: 500.0, gap: 10.0 }
                          children:
                            - type: toggle
                              id: active-toggle
                              text: "Emitter active"
                              checked: true
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: toggle
                              style: { width: 520.0, height: 32.0 }
                              on_change: { event: playground-2d-particles.editor.active }
                            - type: slider
                              id: spawn-rate
                              value: 0.45
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.spawn-rate }
                            - type: text
                              id: spawn-rate-label
                              text: "Spawn rate 90"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: lifetime
                              value: 0.32
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.lifetime }
                            - type: text
                              id: lifetime-label
                              text: "Lifetime 0.65"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: color-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 12.0 }
                          children:
                            - type: row
                              id: color-row
                              style: { width: 520.0, height: 88.0, gap: 12.0 }
                              children:
                                - type: dropdown
                                  id: color-dropdown
                                  selected: "Cyan"
                                  options: ["Cyan", "Orange", "White", "Purple", "Smoke"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 260.0 }
                                  on_change: { event: playground-2d-particles.editor.color }
                                - type: panel
                                  id: color-swatch
                                  style_class: card
                                  style: { width: 72.0, height: 72.0, background: "#39D7FFFF" }
                            - type: text
                              id: color-note
                              text: "Use preset dropdown for named colors or RGB picker for direct Paint-style color editing."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 42.0, word_wrap: true }
                            - type: color-picker-rgb
                              id: rgb-picker
                              color: "#39D7FFFF"
                              style_class: panel_alt
                              style: { width: 520.0, height: 118.0 }
                              on_change: { event: playground-2d-particles.editor.rgb-color }
                        - type: column
                          id: size-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 10.0 }
                          children:
                            - type: row
                              id: sizes
                              style: { width: 520.0, height: 32.0, gap: 12.0 }
                              children:
                                - type: slider
                                  id: initial-size
                                  value: 0.20
                                  min: 0.0
                                  max: 1.0
                                  step: 0.01
                                  style_class: slider
                                  style: { width: 254.0, height: 24.0 }
                                  on_change: { event: playground-2d-particles.editor.initial-size }
                                - type: slider
                                  id: final-size
                                  value: 0.65
                                  min: 0.0
                                  max: 1.0
                                  step: 0.01
                                  style_class: slider
                                  style: { width: 254.0, height: 24.0 }
                                  on_change: { event: playground-2d-particles.editor.final-size }
                            - type: text
                              id: size-label
                              text: "Size 4 -> 13"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: motion-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 10.0 }
                          children:
                            - type: slider
                              id: speed
                              value: 0.33
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.speed }
                            - type: text
                              id: speed-label
                              text: "Speed 100"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: spread
                              value: 0.16
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.spread }
                            - type: text
                              id: spread-label
                              text: "Spread 28"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: forces-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 10.0 }
                          children:
                            - type: slider
                              id: gravity-y
                              value: 0.50
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.gravity-y }
                            - type: text
                              id: gravity-label
                              text: "Gravity Y 0"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: drag
                              value: 0.08
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.drag }
                            - type: text
                              id: drag-label
                              text: "Drag 0.4"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: spawn-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 12.0 }
                          children:
                            - type: option-set
                              id: spawn-kind
                              selected: "circle"
                              options: ["point", "line", "circle", "ring"]
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: option_set
                              style: { width: 520.0, height: 42.0 }
                              on_change: { event: playground-2d-particles.editor.spawn-kind }
                            - type: text
                              id: spawn-label
                              text: "Spawn area circle"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 22.0 }
                        - type: column
                          id: burst-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 12.0 }
                          children:
                            - type: text
                              id: burst-copy
                              text: "Burst spawns one-shot particles without enabling continuous emission."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_body
                              style: { width: 520.0, height: 62.0, word_wrap: true }
                            - type: button
                              id: burst
                              text: "Test Burst"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: button_danger
                              style: { width: 160.0, height: 36.0 }
                              on_click: { event: playground-2d-particles.editor.burst }
                        - type: column
                          id: export-panel
                          visible: false
                          style: { width: 540.0, height: 500.0, gap: 12.0 }
                          children:
                            - type: button
                              id: print-yaml
                              text: "Print YAML"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: button_primary
                              style: { width: 160.0, height: 36.0 }
                              on_click: { event: playground-2d-particles.editor.print-yaml }
                            - type: button
                              id: reset
                              text: "Reset"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: button_secondary
                              style: { width: 120.0, height: 36.0 }
                              on_click: { event: playground-2d-particles.editor.reset }

            - type: row
              id: bottom
              style_class: bottom_bar
              style: { left: 24.0, top: 26.0, width: 1392.0, height: 48.0 }
              children:
                - type: text
                  id: hint
                  text: "Esc menu | Sliders mutate params | Burst tests one-shot particles | Print YAML logs current preset"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_muted
                  style: { width: 1120.0, height: 28.0 }
