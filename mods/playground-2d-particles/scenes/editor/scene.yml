version: 1
scene:
  id: editor
  label: Particle Editor
  description: Runtime ParticleEmitter2D parameter editing with first UI controls.

entities:
  - id: controls
    name: playground-2d-particles-editor-controls
    components:
      - type: InputActionMap
        id: editor
        active: true
        actions:
          ui.back:
            kind: button
            pressed: [Escape]
      - type: EventPipeline
        id: back-to-menu
        topic: playground-2d-particles.menu
        steps:
          - kind: transition_scene
            scene: menu
      - type: Behavior
        kind: scene_back_controller
        action: ui.back
        scene: menu

  - id: camera
    name: playground-2d-particles-editor-camera
    components:
      - type: Camera2D

  - id: backdrop
    name: playground-2d-particles-editor-backdrop
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2400.0, y: -2400.0 }
          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#050812FF"
        z_index: -100.0

  - id: preview-emitter
    name: playground-2d-particles-editor-preview-emitter
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 22.0
        segments: 24
        stroke_color: "#39D7FFFF"
        stroke_width: 2.0
        fill_color: "#39D7FF18"
        z_index: 5.0
      - type: ParticleEmitter2D
        local_direction_degrees: -90.0
        active: true
        spawn_rate: 90.0
        max_particles: 128
        particle_lifetime: 0.65
        lifetime_jitter: 0.12
        initial_speed: 100.0
        speed_jitter: 36.0
        spread_degrees: 28.0
        initial_size: 7.0
        final_size: 22.0
        color: "#39D7FFFF"
        color_ramp:
          interpolation: linear_rgb
          stops:
            - { t: 0.0, color: "#FFFFFFFF" }
            - { t: 0.45, color: "#39D7FFFF" }
            - { t: 1.0, color: "#39D7FF00" }
        spawn_area:
          kind: circle
          radius: 8.0
        forces:
          - kind: drag
            coefficient: 0.4
        z_index: 24.0
        shape: { kind: circle, segments: 8 }
        blend_mode: alpha
        emission_rate_curve: { kind: ease_out }
        size_curve: { kind: ease_out }
        alpha_curve:
          kind: custom
          points:
            - { t: 0.0, value: 0.95 }
            - { t: 0.65, value: 0.55 }
            - { t: 1.0, value: 0.0 }
        speed_curve: { kind: ease_out }

  - id: preview-bg
    name: playground-2d-particles-editor-preview-bg
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#07111FCC"
        z_index: 1.0

  - id: preview-grid-v-left
    name: playground-2d-particles-editor-preview-grid-v-left
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -130.0, y: -260.0 }
          - { x: -130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-center
    name: playground-2d-particles-editor-preview-grid-v-center
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 0.0, y: -260.0 }
          - { x: 0.0, y: 260.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-v-right
    name: playground-2d-particles-editor-preview-grid-v-right
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: 130.0, y: -260.0 }
          - { x: 130.0, y: 260.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-top
    name: playground-2d-particles-editor-preview-grid-h-top
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: -130.0 }
          - { x: 260.0, y: -130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-center
    name: playground-2d-particles-editor-preview-grid-h-center
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 0.0 }
          - { x: 260.0, y: 0.0 }
        stroke_color: "#39D7FF55"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-grid-h-bottom
    name: playground-2d-particles-editor-preview-grid-h-bottom
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: false
        points:
          - { x: -260.0, y: 130.0 }
          - { x: 260.0, y: 130.0 }
        stroke_color: "#39D7FF33"
        stroke_width: 1.0
        z_index: 2.0

  - id: preview-frame
    name: playground-2d-particles-editor-preview-frame
    transform2:
      translation: { x: -330.0, y: 0.0 }
    components:
      - type: VectorShape2D
        kind: polyline
        closed: true
        points:
          - { x: -260.0, y: -260.0 }
          - { x: 260.0, y: -260.0 }
          - { x: 260.0, y: 260.0 }
          - { x: -260.0, y: 260.0 }
        stroke_color: "#39D7FFFF"
        stroke_width: 2.0
        z_index: 3.0

  - id: themes
    name: playground-2d-particles-editor-themes
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiThemeSet
        active: space_dark
        themes:
          - id: space_dark
            palette:
              background: "#050812FF"
              surface: "#101827EE"
              surface_alt: "#172033EE"
              text: "#EAF6FFFF"
              text_muted: "#89A2B7FF"
              border: "#2A6F9EFF"
              accent: "#39D7FFFF"
              accent_text: "#001018FF"
              danger: "#FF4D6DFF"
              warning: "#FFB000FF"
              success: "#5CFF9CFF"

  - id: ui
    name: playground-2d-particles-editor-ui
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: hud
          viewport:
            width: 1440.0
            height: 900.0
            scaling: fit
        root:
          type: column
          id: root
          style_class: root
          style:
            left: 0.0
            top: 0.0
            width: 1440.0
            height: 900.0
            padding: 0.0
            gap: 0.0
            background: "#00000000"
          children:
            - type: row
              id: top
              style_class: top_bar
              style: { left: 24.0, top: 18.0, width: 1392.0, height: 72.0, gap: 14.0 }
              children:
                - type: text
                  id: title
                  text: "PARTICLE EDITOR V0"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_title
                  style: { width: 420.0, height: 34.0, font_size: 28.0 }
                - type: text
                  id: status
                  text: "Editing preview-emitter"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: text_body
                  style: { width: 520.0, height: 28.0 }
                - type: button
                  id: menu
                  text: "Menu"
                  font: playground-2d-particles/fonts/debug-ui
                  style_class: button_secondary
                  style: { width: 110.0, height: 36.0 }
                  on_click: { event: playground-2d-particles.menu }

            - type: row
              id: main
              style: { left: 0.0, top: 18.0, width: 1440.0, height: 700.0, gap: 0.0 }
              children:
                - type: spacer
                  id: world-preview-space
                  style:
                    width: 790.0
                    height: 700.0
                - type: column
                  id: controls
                  style_class: panel
                  style: { width: 590.0, height: 700.0, padding: 18.0, gap: 10.0, background: "#101827EE" }
                  children:
                    - type: text
                      id: preview-label
                      text: "World preview: 400x400 grid on the left"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_body
                      style: { width: 540.0, height: 24.0 }
                    - type: row
                      id: preset-row
                      style: { width: 540.0, height: 42.0, gap: 12.0 }
                      children:
                        - type: text
                          id: preset-label
                          text: "Preset"
                          font: playground-2d-particles/fonts/debug-ui
                          style_class: text_muted
                          style: { width: 88.0, height: 28.0 }
                        - type: dropdown
                          id: preset-dropdown
                          selected: "plasma"
                          options: ["plasma"]
                          font: playground-2d-particles/fonts/debug-ui
                          style_class: dropdown
                          style: { width: 420.0, height: 38.0 }
                          on_change: { event: playground-2d-particles.editor.preset }
                    - type: text
                      id: preset-meta
                      text: "Preset: Plasma / energy / continuous, energy, plasma"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_muted
                      style: { width: 540.0, height: 20.0 }
                    - type: option-set
                      id: tabs
                      selected: "Emission"
                      options: ["Emission", "Color", "Size", "Shape", "Renderer", "Curves", "Motion", "Forces", "Spawn", "Burst", "Export"]
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: option_set
                      style: { width: 540.0, height: 82.0 }
                      on_change: { event: playground-2d-particles.editor.tab }
                    - type: text
                      id: tab-title
                      text: "Emission controls"
                      font: playground-2d-particles/fonts/debug-ui
                      style_class: text_title
                      style: { width: 540.0, height: 28.0, font_size: 20.0 }
                    - type: stack
                      id: tab-panels
                      style: { width: 540.0, height: 410.0 }
                      children:
                        - type: column
                          id: emission-panel
                          style: { width: 540.0, height: 410.0, gap: 10.0 }
                          children:
                            - type: toggle
                              id: active-toggle
                              text: "Emitter active"
                              checked: true
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: toggle
                              style: { width: 520.0, height: 32.0 }
                              on_change: { event: playground-2d-particles.editor.active }
                            - type: slider
                              id: spawn-rate
                              value: 0.45
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.spawn-rate }
                            - type: text
                              id: spawn-rate-label
                              text: "Spawn rate 90"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: lifetime
                              value: 0.32
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.lifetime }
                            - type: text
                              id: lifetime-label
                              text: "Lifetime 0.65"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: max-particles
                              value: 0.47
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.max-particles }
                            - type: text
                              id: max-particles-label
                              text: "Max particles 160"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: color-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 10.0 }
                          children:
                            - type: row
                              id: color-row
                              style: { width: 520.0, height: 72.0, gap: 12.0 }
                              children:
                                - type: dropdown
                                  id: color-dropdown
                                  selected: "Cyan"
                                  options: ["Cyan", "Orange", "White", "Purple", "Smoke"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 260.0 }
                                  on_change: { event: playground-2d-particles.editor.color }
                                - type: panel
                                  id: color-swatch
                                  style_class: card
                                  style: { width: 58.0, height: 58.0, background: "#39D7FFFF" }
                            - type: text
                              id: color-note
                              text: "Named color and RGB picker clear ColorRamp. Ramp presets drive color over particle lifetime."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 42.0, word_wrap: true }
                            - type: row
                              id: ramp-row
                              style: { width: 520.0, height: 42.0, gap: 10.0 }
                              children:
                                - type: dropdown
                                  id: ramp-preset
                                  selected: "Plasma"
                                  options: ["None", "Fire", "Smoke", "Plasma", "Portal", "Snow"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 250.0, height: 38.0 }
                                  on_change: { event: playground-2d-particles.editor.ramp-preset }
                                - type: dropdown
                                  id: ramp-interpolation
                                  selected: "linear_rgb"
                                  options: ["linear_rgb", "step"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 170.0, height: 38.0 }
                                  on_change: { event: playground-2d-particles.editor.ramp-interpolation }
                            - type: row
                              id: ramp-preview
                              style: { width: 520.0, height: 30.0, gap: 0.0 }
                              children:
                                - type: panel
                                  id: stop-0
                                  style: { width: 130.0, height: 26.0, background: "#FFFFFFFF" }
                                - type: panel
                                  id: stop-1
                                  style: { width: 130.0, height: 26.0, background: "#39D7FFFF" }
                                - type: panel
                                  id: stop-2
                                  style: { width: 130.0, height: 26.0, background: "#236DFFFF" }
                                - type: panel
                                  id: stop-3
                                  style: { width: 130.0, height: 26.0, background: "#0A1A6600" }
                            - type: text
                              id: ramp-label
                              text: "ColorRamp Plasma / linear_rgb"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: color-picker-rgb
                              id: rgb-picker
                              color: "#39D7FFFF"
                              style_class: panel_alt
                              style: { width: 520.0, height: 108.0 }
                              on_change: { event: playground-2d-particles.editor.rgb-color }
                        - type: column
                          id: size-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 10.0 }
                          children:
                            - type: row
                              id: sizes
                              style: { width: 520.0, height: 32.0, gap: 12.0 }
                              children:
                                - type: slider
                                  id: initial-size
                                  value: 0.20
                                  min: 0.0
                                  max: 1.0
                                  step: 0.01
                                  style_class: slider
                                  style: { width: 254.0, height: 24.0 }
                                  on_change: { event: playground-2d-particles.editor.initial-size }
                                - type: slider
                                  id: final-size
                                  value: 0.65
                                  min: 0.0
                                  max: 1.0
                                  step: 0.01
                                  style_class: slider
                                  style: { width: 254.0, height: 24.0 }
                                  on_change: { event: playground-2d-particles.editor.final-size }
                            - type: text
                              id: size-label
                              text: "Size 4 -> 13"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: shape-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 12.0 }
                          children:
                            - type: row
                              id: shape-row
                              style: { width: 520.0, height: 42.0, gap: 10.0 }
                              children:
                                - type: dropdown
                                  id: shape-kind
                                  selected: "circle"
                                  options: ["circle", "line", "quad"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 250.0, height: 38.0 }
                                  on_change: { event: playground-2d-particles.editor.shape-kind }
                                - type: dropdown
                                  id: align-kind
                                  selected: "velocity"
                                  options: ["velocity", "none", "emitter", "random"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 250.0, height: 38.0 }
                                  on_change: { event: playground-2d-particles.editor.align-kind }
                            - type: option-set
                              id: shape-mode
                              selected: "single"
                              options: ["single", "random_mix"]
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: option_set
                              style: { width: 520.0, height: 42.0 }
                              on_change: { event: playground-2d-particles.editor.shape-mode }
                            - type: text
                              id: shape-label
                              text: "Shape circle / Align velocity"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 24.0 }
                            - type: text
                              id: shape-copy
                              text: "Shape changes particle primitive. Align controls rotation: velocity for sparks, emitter for jets, none for screen-stable dots."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_body
                              style: { width: 520.0, height: 72.0, word_wrap: true }
                        - type: column
                          id: motion-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 10.0 }
                          children:
                            - type: slider
                              id: speed
                              value: 0.33
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.speed }
                            - type: text
                              id: speed-label
                              text: "Speed 100"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                            - type: slider
                              id: spread
                              value: 0.16
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.spread }
                            - type: text
                              id: spread-label
                              text: "Spread 28"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 18.0 }
                        - type: column
                          id: renderer-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 12.0 }
                          children:
                            - type: row
                              id: blend-row
                              style: { width: 520.0, height: 42.0, gap: 10.0 }
                              children:
                                - type: dropdown
                                  id: blend-kind
                                  selected: "alpha"
                                  options: ["alpha", "additive", "screen", "multiply"]
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: dropdown
                                  style: { width: 250.0, height: 38.0 }
                                  on_change: { event: playground-2d-particles.editor.blend-kind }
                                - type: text
                                  id: renderer-mode
                                  text: "Renderer mode"
                                  font: playground-2d-particles/fonts/debug-ui
                                  style_class: text_muted
                                  style: { width: 250.0, height: 28.0 }
                            - type: slider
                              id: z-index
                              value: 0.48
                              min: 0.0
                              max: 1.0
                              step: 0.01
                              style_class: slider
                              style: { width: 520.0, height: 24.0 }
                              on_change: { event: playground-2d-particles.editor.z-index }
                            - type: text
                              id: renderer-label
                              text: "Blend alpha / z-index 24"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 24.0 }
                            - type: text
                              id: renderer-copy
                              text: "Blend mode is exported, passed through draw commands and rendered by the WGPU particle path. Use alpha for neutral particles, additive/screen for glow, multiply for darker overlays."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_body
                              style: { width: 520.0, height: 88.0, word_wrap: true }
                        - type: column
                          id: curves-panel
                          visible: false
                          style: { width: 540.0, height: 410.0, gap: 8.0 }
                          children:
                            - type: text
                              id: curves-copy
                              text: "Drag points to shape runtime value curves. Emission samples intensity; size, alpha and speed sample particle lifetime."
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_body
                              style: { width: 520.0, height: 44.0, word_wrap: true }
                            - type: text
                              id: emission-curve-label
                              text: "Emission rate"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 16.0 }
                            - type: curve-editor
                              id: emission-curve
                              values: [1.0, 1.0, 1.0, 1.0]
                              style_class: panel_alt
                              style: { width: 520.0, height: 72.0 }
                              on_change: { event: playground-2d-particles.editor.curve-emission }
                            - type: text
                              id: size-curve-label
                              text: "Size over lifetime"
                              font: playground-2d-particles/fonts/debug-ui
                              style_class: text_muted
                              style: { width: 520.0, height: 16.0 }
                            - type: curve-editor
                              id: size-curve
                              values: [0.0, 0.55, 0.86, 1.0]
                              style_class: panel_alt
                              style: { width: 520.0, height: 72.0 }
                              on_change: { event: playground-2d-particles.editor.curve-size }
