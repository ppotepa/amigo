kind: particle-preset-2d
id: frost
label: Frost
category: elemental
tags: [continuous, cold, crystalline]
emitter:
  type: ParticleEmitter2D
  local_direction_degrees: 90.0
  active: false
  spawn_rate: 74.0
  max_particles: 170
  particle_lifetime: 0.95
  lifetime_jitter: 0.22
  initial_speed: 58.0
  speed_jitter: 34.0
  spread_degrees: 62.0
  initial_size: 2.0
  final_size: 10.0
  color_ramp:
    interpolation: linear_rgb
    stops:
      - { t: 0.0, color: "#FFFFFFFF" }
      - { t: 0.35, color: "#DDEBFFFF" }
      - { t: 0.75, color: "#39D7FF99" }
      - { t: 1.0, color: "#39D7FF00" }
  forces:
    - kind: drag
      coefficient: 0.9
  shape: { kind: line, length: 10.0 }
  size_curve: { kind: ease_out }
  alpha_curve:
    kind: custom
    points:
      - { t: 0.0, value: 1.0 }
      - { t: 0.72, value: 0.65 }
      - { t: 1.0, value: 0.0 }

