kind: particle-preset-2d
id: poison
label: Poison
category: magic
tags: [continuous, toxic, cloud]
emitter:
  type: ParticleEmitter2D
  local_direction_degrees: 90.0
  active: false
  spawn_rate: 58.0
  max_particles: 130
  particle_lifetime: 1.65
  lifetime_jitter: 0.4
  initial_speed: 26.0
  speed_jitter: 22.0
  spread_degrees: 100.0
  initial_size: 8.0
  final_size: 26.0
  color_ramp:
    interpolation: linear_rgb
    stops:
      - { t: 0.0, color: "#B6FF4A00" }
      - { t: 0.24, color: "#A8FF38AA" }
      - { t: 0.62, color: "#5CA80077" }
      - { t: 1.0, color: "#18280000" }
  spawn_area:
    kind: circle
    radius: 22.0
  forces:
    - kind: wind
      velocity: { x: 22.0, y: 18.0 }
      strength: 0.3
    - kind: drag
      coefficient: 0.18
  shape: { kind: circle, segments: 9 }
  size_curve: { kind: ease_out }
  alpha_curve:
    kind: custom
    points:
      - { t: 0.0, value: 0.0 }
      - { t: 0.18, value: 0.72 }
      - { t: 1.0, value: 0.0 }

