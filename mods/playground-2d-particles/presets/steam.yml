kind: particle-preset-2d
id: steam
label: Steam
category: ambient
tags: [continuous, smoke, soft]
emitter:
  type: ParticleEmitter2D
  local_direction_degrees: 90.0
  active: false
  spawn_rate: 64.0
  max_particles: 150
  particle_lifetime: 1.55
  lifetime_jitter: 0.38
  initial_speed: 38.0
  speed_jitter: 18.0
  spread_degrees: 42.0
  initial_size: 7.0
  final_size: 32.0
  color_ramp:
    interpolation: linear_rgb
    stops:
      - { t: 0.0, color: "#C8F0FF00" }
      - { t: 0.22, color: "#D8F4FF88" }
      - { t: 0.65, color: "#A8C8D866" }
      - { t: 1.0, color: "#40506000" }
  spawn_area:
    kind: circle
    radius: 14.0
  forces:
    - kind: wind
      velocity: { x: -12.0, y: 62.0 }
      strength: 0.42
    - kind: drag
      coefficient: 0.2
  shape: { kind: circle, segments: 10 }
  size_curve: { kind: ease_out }
  alpha_curve:
    kind: custom
    points:
      - { t: 0.0, value: 0.0 }
      - { t: 0.24, value: 0.72 }
      - { t: 1.0, value: 0.0 }

