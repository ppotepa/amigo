version: 1
scene:
  id: hello-world-square
  label: Rotating Square
  description: 2D WGPU playground with a square and HELLO WORLD text.
entities:
  - id: controls
    name: playground-2d-square-controls
    components:
      - type: InputActionMap
        id: hello-world-square
        active: true
        actions:
          square.move_left:
            kind: button
            pressed: [ArrowLeft]
          square.move_right:
            kind: button
            pressed: [ArrowRight]
          square.next_scene:
            kind: button
            pressed: [ArrowUp]

  - id: camera
    name: playground-2d-camera
    components:
      - type: Camera2D

  - id: square
    name: playground-2d-square
    transform2:
      translation:
        x: 0.0
        y: 0.0
      rotation_radians: 0.0
      scale:
        x: 1.0
        y: 1.0
    components:
      - type: Sprite2D
        texture: playground-2d/textures/square
        size:
          x: 128.0
          y: 128.0

  - id: label
    name: playground-2d-hello
    transform2:
      translation:
        x: 0.0
        y: -180.0
      rotation_radians: 0.0
      scale:
        x: 1.0
        y: 1.0
    components:
      - type: Text2D
        content: HELLO WORLD
        font: playground-2d/fonts/debug-ui
        bounds:
          x: 480.0
          y: 96.0
