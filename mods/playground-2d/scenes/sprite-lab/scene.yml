version: 1
scene:
  id: sprite-lab
  label: Sprite Lab
  description: 2D playground scene for sprite-oriented rendering checks.
entities:
  - id: camera
    name: playground-2d-camera
    components:
      - type: Camera2D

  - id: sprite
    name: playground-2d-sprite
    transform2:
      translation:
        x: 0.0
        y: 0.0
      scale:
        x: 1.0
        y: 1.0
    components:
      - type: Sprite2D
        texture: playground-2d/spritesheets/sprite-lab
        size:
          x: 128.0
          y: 128.0
