id = "playground-2d"
name = "Playground 2D"
version = "0.1.0"
description = "Sandbox mod for validating 2D domain features."
authors = ["Amigo Engine Team"]
dependencies = ["core"]
capabilities = ["rendering_2d", "text_2d"]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "basic-scripting-demo"
label = "Basic Scripting Demo"
description = "Guided 2D showcase for the world.* Rhai scripting API."
path = "scenes/basic-scripting-demo"
launcher_visible = true

[[scenes]]
id = "hello-world-spritesheet"
label = "Hello World Spritesheet"
description = "Scene-centric WGPU playground with an animated spritesheet and HELLO WORLD text."
path = "scenes/hello-world-spritesheet"
launcher_visible = true

[[scenes]]
id = "hello-world-square"
label = "Hello World Square"
description = "Simple square playground scene for manual rotation checks."
path = "scenes/hello-world-square"
launcher_visible = true

[[scenes]]
id = "screen-space-preview"
label = "Screen Space UI Preview"
description = "Dynamic combat-HUD style UI showcase driven by YAML, Rhai, and the native screen-space runtime."
path = "scenes/screen-space-preview"
launcher_visible = true

[[scenes]]
id = "sprite-lab"
label = "Sprite Lab"
description = "2D playground scene for sprite-oriented rendering checks."
path = "scenes/sprite-lab"
launcher_visible = false

[[scenes]]
id = "text-lab"
label = "Text Lab"
description = "2D playground scene for text rendering and layout checks."
path = "scenes/text-lab"
launcher_visible = false
