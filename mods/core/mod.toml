id = "core"
name = "Core"
version = "0.1.0"
description = "Base content and shared scripting utilities for Amigo."
authors = ["Amigo Engine Team"]
dependencies = []
capabilities = ["core_runtime", "shared_content"]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "bootstrap"
label = "Bootstrap"
description = "Minimal core startup scene used by non-dev profiles."
path = "scenes/bootstrap"
launcher_visible = true

[[scenes]]
id = "shared-content"
label = "Shared Content"
description = "Shared content validation scene for base runtime content."
path = "scenes/shared-content"
launcher_visible = true
