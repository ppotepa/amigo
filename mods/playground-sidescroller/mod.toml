id = "playground-sidescroller"
name = "Sidescroller Demo"
version = "0.1.0"
description = "2D platformer-style vertical slice combining tilemaps, motion, physics, HUD, and audio."
authors = ["Amigo Engine Team"]
dependencies = ["core"]
capabilities = [
  "rendering_2d",
  "text_2d",
  "screen_space_ui",
  "physics_2d",
  "tilemap_2d",
  "motion_2d",
  "audio_api",
  "generated_audio",
]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "vertical-slice"
label = "Sidescroller Vertical Slice"
description = "Sidescroller integration playground combining tilemap, player controller, HUD, and generated audio metadata."
path = "scenes/vertical-slice"
launcher_visible = true
