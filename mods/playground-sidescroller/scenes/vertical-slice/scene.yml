version: 1
scene:
  id: vertical-slice
  label: Sidescroller Vertical Slice
  description: Expanded sidescroller integration playground with a larger tilemap, 25 coins, HUD state, and generated audio metadata.

entities:
  - id: controls
    name: playground-sidescroller-controls
    components:
      - type: InputActionMap
        id: gameplay
        active: true
        actions:
          player.move:
            kind: axis
            positive: [ArrowRight, KeyD]
            negative: [ArrowLeft, KeyA]
          player.jump_pressed:
            kind: button
            pressed: [Space, ArrowUp, KeyW]
          player.jump_down:
            kind: button
            pressed: [Space, ArrowUp, KeyW]

  - id: background-layer-01
    name: playground-sidescroller-background-layer-01
    transform2:
      translation: { x: 2560.0, y: 420.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: playground-sidescroller/backgrounds/layer-01
        size: { x: 15360.0, y: 5120.0 }
        z_index: -40.0
      - type: Parallax2D
        camera: playground-sidescroller-camera
        factor: { x: 0.02, y: 0.02 }

  - id: background-layer-02
    name: playground-sidescroller-background-layer-02
    transform2:
      translation: { x: 2560.0, y: 620.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: playground-sidescroller/backgrounds/layer-02
        size: { x: 15360.0, y: 5120.0 }
        z_index: -30.0
      - type: Parallax2D
        camera: playground-sidescroller-camera
        factor: { x: 0.06, y: 0.06 }

  - id: background-layer-03
    name: playground-sidescroller-background-layer-03
    transform2:
      translation: { x: 2560.0, y: 780.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: playground-sidescroller/backgrounds/layer-03
        size: { x: 15360.0, y: 5120.0 }
        z_index: -20.0
      - type: Parallax2D
        camera: playground-sidescroller-camera
        factor: { x: 0.14, y: 0.14 }

  - id: background-layer-04
    name: playground-sidescroller-background-layer-04
    transform2:
      translation: { x: 2560.0, y: 960.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: playground-sidescroller/backgrounds/layer-04
        size: { x: 15360.0, y: 5120.0 }
        z_index: -10.0
      - type: Parallax2D
        camera: playground-sidescroller-camera
        factor: { x: 0.28, y: 0.28 }

  - id: camera
    name: playground-sidescroller-camera
    transform2:
      translation: { x: 64.0, y: 96.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Camera2D
      - type: CameraFollow2D
        target: playground-sidescroller-player
        offset: { x: 0.0, y: 0.0 }
        lerp: 1.0

  - id: tilemap
    name: playground-sidescroller-tilemap
    components:
      - type: TileMap2D
        tileset: playground-sidescroller/tilesets/platformer
        ruleset: playground-sidescroller/tilesets/platformer-rules
        tile_size: { x: 16.0, y: 16.0 }
        grid:
          - "................................................................................................................................................................................................................................................................................................................................"
          - "................................................................................................................................................................................................................................................................................................................................"
          - "................................................................................................................................................................................................................................................................................................................................"
          - "................................................................................................................................................................................................................................................................................................................................"
          - "................................................................................................................................................C.........................................................................................................C....................................................................."
          - "..........................................................C...............................................................................................C...........C...............................................................................................C...........C............................................."
          - "......................................................................................C...........................C.................C.............................................................C...........................C...............C.................................................................C..............."
          - "............................C.................C...........................C.............................................C...................================....................C.....C.................................................................================......................C...........C....................."
          - "........................................................================..............................C.....................====================================================..................................C.....................================================================........................................"
          - "..................C.....................================....................................................============================..................==================================================............F..........."
          - "........P...............########################################################################################################################################################################################################################################################################################################"
          - "################################################################################################################################################################################################################################################################################################################################"
          - "################################################################################################################################################################################################################################################################################################################################"
          - "################################################################################################################################################################################################################################################################################################################################"

  - id: player
    name: playground-sidescroller-player
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: TileMapMarker2D
        tilemap_entity: playground-sidescroller-tilemap
        symbol: "P"
        index: 0
        offset: { x: 0.0, y: 8.0 }
      - type: Sprite2D
        texture: playground-sidescroller/textures/player
        size: { x: 32.0, y: 32.0 }
      - type: KinematicBody2D
        velocity: { x: 0.0, y: 0.0 }
        gravity_scale: 1.0
        terminal_velocity: 720.0
      - type: AabbCollider2D
        size: { x: 20.0, y: 30.0 }
        offset: { x: 0.0, y: 1.0 }
        layer: player
        mask: [world, trigger]
      - type: MotionController2D
        max_speed: 180.0
        acceleration: 900.0
        deceleration: 1200.0
        air_acceleration: 500.0
        gravity: 900.0
        jump_velocity: -360.0
        terminal_velocity: 720.0

  - id: coin-01
    name: playground-sidescroller-coin-01
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: TileMapMarker2D
        tilemap_entity: playground-sidescroller-tilemap
        symbol: "C"
        index: 0
        offset: { x: 0.0, y: 0.0 }
      - type: Sprite2D
        texture: playground-sidescroller/textures/coin
        size: { x: 16.0, y: 16.0 }
        animation:
          fps: 5.0
          looping: true
      - type: Trigger2D
        size: { x: 16.0, y: 16.0 }
        offset: { x: 0.0, y: 0.0 }
        layer: trigger
        mask: [player]
        event: coin.collected

