version: 1
scene:
  id: menu
  label: Craterbound Menu
  description: Main menu for the Terrain Duel playground.

entities:
  - id: controls
    name: craterbound-menu-controls
    components:
      - type: InputActionMap
        id: menu
        active: true
        actions:
          menu.start_match:
            kind: button
            pressed: [Digit1, Key1, "1"]
          menu.open_terrain_lab:
            kind: button
            pressed: [Digit2, Key2, "2"]
          menu.open_split_lab:
            kind: button
            pressed: [Digit3, Key3, "3"]
          menu.open_weapon_lab:
            kind: button
            pressed: [Digit4, Key4, "4"]
          ui.back:
            kind: button
            pressed: [Escape]
      - type: EventPipeline
        id: start-match
        topic: craterbound.menu.start-match
        steps:
          - kind: transition_scene
            scene: match
      - type: EventPipeline
        id: terrain-lab-placeholder
        topic: craterbound.menu.terrain-lab
        steps:
          - kind: set_state
            key: status_text
            value: TERRAIN LAB WILL USE DESTRUCTIBLE SURFACES
      - type: EventPipeline
        id: split-lab-placeholder
        topic: craterbound.menu.split-lab
        steps:
          - kind: set_state
            key: status_text
            value: SPLIT SCREEN LAB NOT IMPLEMENTED YET
      - type: EventPipeline
        id: weapon-lab-placeholder
        topic: craterbound.menu.weapon-lab
        steps:
          - kind: set_state
            key: status_text
            value: WEAPON LAB NOT IMPLEMENTED YET
      - type: EventPipeline
        id: back-placeholder
        topic: craterbound.menu.back
        steps:
          - kind: set_state
            key: status_text
            value: BACK UNAVAILABLE FROM ROOT MENU
      - type: Behavior
        kind: scene_transition_controller
        action: menu.start_match
        scene: match
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_terrain_lab
        key: status_text
        value: TERRAIN LAB WILL USE DESTRUCTIBLE SURFACES
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_split_lab
        key: status_text
        value: SPLIT SCREEN LAB NOT IMPLEMENTED YET
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_weapon_lab
        key: status_text
        value: WEAPON LAB NOT IMPLEMENTED YET
      - type: Behavior
        kind: set_state_on_action_controller
        action: ui.back
        key: status_text
        value: BACK UNAVAILABLE FROM ROOT MENU

  - id: camera
    name: craterbound-menu-camera
    components:
      - type: Camera2D

  - id: backdrop-sky
    name: craterbound-menu-backdrop-sky
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2600.0, y: -1600.0 }
          - { x: 2600.0, y: -1600.0 }
          - { x: 2600.0, y: 1600.0 }
          - { x: -2600.0, y: 1600.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#07121BFF"
        z_index: -100.0

  - id: backdrop-horizon
    name: craterbound-menu-horizon
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2600.0, y: 80.0 }
          - { x: 2600.0, y: -40.0 }
          - { x: 2600.0, y: 1600.0 }
          - { x: -2600.0, y: 1600.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#203A32FF"
        z_index: -90.0

  - id: backdrop-ground
    name: craterbound-menu-ground
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2600.0, y: 230.0 }
          - { x: -2100.0, y: 180.0 }
          - { x: -1500.0, y: 260.0 }
          - { x: -860.0, y: 130.0 }
          - { x: -260.0, y: 220.0 }
          - { x: 360.0, y: 110.0 }
          - { x: 980.0, y: 250.0 }
          - { x: 1660.0, y: 150.0 }
          - { x: 2600.0, y: 260.0 }
          - { x: 2600.0, y: 1600.0 }
          - { x: -2600.0, y: 1600.0 }
        stroke_color: "#4F7B58AA"
        stroke_width: 4.0
        fill_color: "#14251DFF"
        z_index: -80.0

  - id: crater-left
    name: craterbound-menu-crater-left
    components:
      - type: VectorShape2D
        kind: circle
        radius: 170.0
        segments: 36
        stroke_color: "#E2B96A44"
        stroke_width: 6.0
        fill_color: "#050812AA"
        z_index: -70.0
    transform2:
      translation: { x: -520.0, y: 270.0 }

  - id: crater-right
    name: craterbound-menu-crater-right
    components:
      - type: VectorShape2D
        kind: circle
        radius: 120.0
        segments: 32
        stroke_color: "#E85F3C55"
        stroke_width: 5.0
        fill_color: "#061018AA"
        z_index: -69.0
    transform2:
      translation: { x: 610.0, y: 220.0 }

  - id: accent-sun
    name: craterbound-menu-low-sun
    components:
      - type: VectorShape2D
        kind: circle
        radius: 84.0
        segments: 42
        stroke_color: "#FFD27AFF"
        stroke_width: 3.0
        fill_color: "#FF7A3C88"
        z_index: -95.0
    transform2:
      translation: { x: 820.0, y: -330.0 }

  - id: themes
    name: craterbound-menu-themes
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiThemeSet
        active: craterbound_twilight
        themes:
          - id: craterbound_twilight
            palette:
              background: "#07121BFF"
              surface: "#10201CEE"
              surface_alt: "#192F28EE"
              text: "#F4F0DEFF"
              text_muted: "#AFC5B2FF"
              border: "#5F8866FF"
              accent: "#E2B96AFF"
              accent_text: "#10130DFF"
              danger: "#E85F3CFF"
              warning: "#FFD27AFF"
              success: "#72E09AFF"

  - id: ui
    name: craterbound-menu-ui
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiModelBindings
        bindings:
          - path: craterbound-menu-ui.root
            state: active_theme
            kind: theme
          - path: craterbound-menu-ui.root.status
            state: status_text
            kind: text
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
          viewport:
            width: 1280.0
            height: 720.0
            scaling: fit
        root:
          type: column
          id: root
          style_class: root
          style:
            left: 0.0
            top: 0.0
            width: 1280.0
            height: 720.0
            padding: 76.0
            gap: 14.0
          children:
            - type: text
              id: kicker
              text: "TERRAIN DUEL LAB"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: text_muted
              style:
                width: 1128.0
                height: 30.0
                font_size: 18.0
                align: center
            - type: text
              id: title
              text: "CRATERBOUND"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: text_title
              style:
                width: 1128.0
                height: 82.0
                font_size: 62.0
                align: center
            - type: text
              id: subtitle
              text: "Two players. One broken map."
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: text_muted
              style:
                width: 1128.0
                height: 34.0
                font_size: 20.0
                align: center
            - type: spacer
              id: title-gap
              style:
                width: 1128.0
                height: 24.0
            - type: button
              id: start-match
              text: "1  START MATCH"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: button_primary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: craterbound.menu.start-match
            - type: button
              id: terrain-lab
              text: "2  SURFACE LAB"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: craterbound.menu.terrain-lab
            - type: button
              id: split-lab
              text: "3  SPLIT SCREEN LAB"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: craterbound.menu.split-lab
            - type: button
              id: weapon-lab
              text: "4  WEAPON LAB"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: craterbound.menu.weapon-lab
            - type: text
              id: status
              text: "DESTRUCTIBLE SURFACE DUEL PLAYGROUND"
              font: playground-2d-terrain-duel/fonts/debug-ui
              style_class: text_muted
              style:
                width: 1128.0
                height: 36.0
                font_size: 16.0
                align: center
