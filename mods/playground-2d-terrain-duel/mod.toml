id = "playground-2d-terrain-duel"
name = "Craterbound"
version = "0.1.0"
description = "Local 2D terrain duel playground for destructible surfaces, split screen, weapons, pickups, and match flow."
authors = ["Amigo Engine Team"]
dependencies = ["core"]
capabilities = ["rendering_2d", "vector_2d", "screen_space_ui", "motion_2d", "physics_2d", "particles_2d"]
launcher_category = ["2D", "Games", "Playgrounds"]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "menu"
label = "Craterbound Menu"
description = "Main menu for the Terrain Duel playground."
path = "scenes/menu"
launcher_visible = true

[[scenes]]
id = "match"
label = "Craterbound Match"
description = "Single-player first vertical slice for movement, camera, placeholder player, and HUD."
path = "scenes/match"
launcher_visible = true
