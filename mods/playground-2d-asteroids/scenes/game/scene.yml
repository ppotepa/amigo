version: 1
scene:
  id: game
  label: Asteroids
  description: Retro vector arcade Asteroids gameplay scene using generic pools, collision events, motion, bounds, lifetime, and state-bound UI.

collision_events:
  - id: bullet-hit-asteroid
    source:
      kind: pool
      value: player-bullets
    target:
      kind: tag
      value: asteroid
    event: asteroids.bullet_hit_asteroid
    once_per_overlap: true
  - id: ship-hit-asteroid
    source:
      kind: entity
      value: playground-2d-asteroids-ship
    target:
      kind: tag
      value: asteroid
    event: asteroids.ship_hit_asteroid
    once_per_overlap: false

entities:
  - id: camera
    name: playground-2d-asteroids-camera
    tags: [camera]
    components:
      - type: Camera2D

  - id: arena-void
    name: playground-2d-asteroids-arena-void
    tags: [arena]
    groups: [arena-background]
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -2400.0, y: -2400.0 }
          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#000000FF"
        z_index: -220.0

  - id: arena-star-01
    name: playground-2d-asteroids-arena-star-01
    visible: false
    simulation_enabled: false
    collision_enabled: false
    transform2:
      translation: { x: -742.0, y: 336.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 1.4
        segments: 8
        stroke_color: "#E8E8E855"
        stroke_width: 0.8
        fill_color: "#E8E8E855"
        z_index: -180.0

  - id: arena-star-02
    name: playground-2d-asteroids-arena-star-02
    visible: false
    simulation_enabled: false
    collision_enabled: false
    transform2:
      translation: { x: -318.0, y: -324.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 1.2
        segments: 8
        stroke_color: "#E8E8E844"
        stroke_width: 0.8
        fill_color: "#E8E8E844"
        z_index: -180.0

  - id: arena-star-03
    name: playground-2d-asteroids-arena-star-03
    visible: false
    simulation_enabled: false
    collision_enabled: false
    transform2:
      translation: { x: 118.0, y: 366.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 1.3
        segments: 8
        stroke_color: "#E8E8E850"
        stroke_width: 0.8
        fill_color: "#E8E8E850"
        z_index: -180.0

  - id: arena-star-04
    name: playground-2d-asteroids-arena-star-04
    visible: false
    simulation_enabled: false
    collision_enabled: false
    transform2:
      translation: { x: 724.0, y: -278.0 }
    components:
      - type: VectorShape2D
        kind: circle
        radius: 1.6
        segments: 8
        stroke_color: "#E8E8E844"
        stroke_width: 0.8
        fill_color: "#E8E8E844"
        z_index: -180.0

  - id: arena-frame
    name: playground-2d-asteroids-frame
    components:
      - type: VectorShape2D
        kind: polyline
        closed: true
        points:
          - { x: -900.0, y: -500.0 }
          - { x: 900.0, y: -500.0 }
          - { x: 900.0, y: 500.0 }
          - { x: -900.0, y: 500.0 }
        stroke_color: "#F0F0F033"
        stroke_width: 1.2
        z_index: -120.0

  - id: ship
    name: playground-2d-asteroids-ship
    tags: [player, ship]
    groups: [player]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    properties:
      radius: 11
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
    components:
      - type: VectorShape2D
        kind: polyline
        closed: true
        points:
          - { x: 19.0, y: 0.0 }
          - { x: -11.0, y: -12.0 }
          - { x: -4.0, y: 0.0 }
          - { x: -11.0, y: 12.0 }
        stroke_color: "#F2F2F2FF"
        stroke_width: 2.0
        z_index: 40.0
      - type: CircleCollider2D
        radius: 11.0
      - type: ProjectileEmitter2D
        pool: player-bullets
        speed: 620.0
        spawn_offset: { x: 28.0, y: 0.0 }
        inherit_velocity_scale: 0.0
      - type: FreeflightMotion2D
        thrust_acceleration: 420.0
        reverse_acceleration: 220.0
        strafe_acceleration: 0.0
        turn_acceleration: 13.5
        linear_damping: 45.0
        turn_damping: 8.0
        max_speed: 360.0
        max_angular_speed: 4.5
        thrust_response_curve:
          kind: ease_out
        reverse_response_curve:
          kind: ease_in
        strafe_response_curve:
          kind: linear
        turn_response_curve:
          kind: smooth_step
      - type: Bounds2D
        min: { x: -930.0, y: -530.0 }
        max: { x: 930.0, y: 530.0 }
        behavior: wrap

  - id: ship-shield
    name: playground-2d-asteroids-ship-shield
    tags: [player, shield]
    groups: [player-fx]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
    components:
      - type: VectorShape2D
        kind: circle
        radius: 30.0
        segments: 36
        stroke_color: "#F8F8F8AA"
        stroke_width: 1.3
        fill_color: "#00000000"
        z_index: 42.0
      - type: FreeflightMotion2D
        thrust_acceleration: 420.0
        reverse_acceleration: 220.0
        strafe_acceleration: 0.0
        turn_acceleration: 13.5
        linear_damping: 45.0
        turn_damping: 8.0
        max_speed: 360.0
        max_angular_speed: 4.5
      - type: Bounds2D
        min: { x: -930.0, y: -530.0 }
        max: { x: 930.0, y: 530.0 }
        behavior: wrap

  - id: main-thruster
    name: playground-2d-asteroids-main-thruster
    tags: [player, fx, particles]
    groups: [player-fx]
    visible: true
    simulation_enabled: true
    collision_enabled: false
    components:
      - type: ParticleEmitter2D
        attached_to: playground-2d-asteroids-ship
        local_offset: { x: -15.0, y: 0.0 }
        local_direction_degrees: 180.0
        active: false
        spawn_rate: 150.0
        max_particles: 140
        particle_lifetime: 0.26
        lifetime_jitter: 0.05
        initial_speed: 190.0
        speed_jitter: 34.0
        spread_degrees: 12.0
        inherit_parent_velocity: 0.12
        initial_size: 2.0
        final_size: 9.0
        color: "#39D7FFFF"
        color_ramp:
          interpolation: linear_rgb
          stops:
            - { t: 0.0, color: "#FFFFFFFF" }
            - { t: 0.28, color: "#39D7FFFF" }
            - { t: 0.76, color: "#246DFFFF" }
            - { t: 1.0, color: "#00104000" }
        spawn_area:
          kind: line
          length: 18.0
        z_index: 38.0
        shape:
          kind: line
          length: 10.0
        emission_rate_curve:
          kind: ease_out
        size_curve:
          kind: ease_out
        alpha_curve:
          kind: custom
          points:
            - { t: 0.0, value: 0.95 }
            - { t: 0.35, value: 0.82 }
            - { t: 0.78, value: 0.24 }
            - { t: 1.0, value: 0.0 }
        speed_curve:
          kind: ease_out
        align: velocity
        blend_mode: additive
        forces:
          - kind: drag
            coefficient: 0.9

  - id: player-bullet-pool
    name: playground-2d-asteroids-player-bullet-pool
    tags: [pool]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: EntityPool
        pool: player-bullets
        members:
          - playground-2d-asteroids-bullet-01
          - playground-2d-asteroids-bullet-02
          - playground-2d-asteroids-bullet-03
          - playground-2d-asteroids-bullet-04
          - playground-2d-asteroids-bullet-05
          - playground-2d-asteroids-bullet-06

  - id: asteroid-pool
    name: playground-2d-asteroids-asteroid-pool
    tags: [pool]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: EntityPool
        pool: asteroids
        members:
          - playground-2d-asteroids-asteroid-01
          - playground-2d-asteroids-asteroid-02
          - playground-2d-asteroids-asteroid-03
          - playground-2d-asteroids-asteroid-04
          - playground-2d-asteroids-asteroid-05
          - playground-2d-asteroids-asteroid-06
          - playground-2d-asteroids-asteroid-07
          - playground-2d-asteroids-asteroid-08
          - playground-2d-asteroids-asteroid-09
          - playground-2d-asteroids-asteroid-10
          - playground-2d-asteroids-asteroid-11
          - playground-2d-asteroids-asteroid-12
          - playground-2d-asteroids-asteroid-13
          - playground-2d-asteroids-asteroid-14
          - playground-2d-asteroids-asteroid-15
          - playground-2d-asteroids-asteroid-16

  - id: bullet-01
    name: playground-2d-asteroids-bullet-01
    tags: [projectile, player-bullet]
    groups: [player-projectiles]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    properties: { damage: 1 }
    components: &bullet_components
      - type: VectorShape2D
        kind: circle
        radius: 2.8
        segments: 10
        stroke_color: "#F8F8F8FF"
        stroke_width: 1.0
        fill_color: "#F8F8F8FF"
        z_index: 50.0
      - type: CircleCollider2D
        radius: 4.0
      - type: AabbCollider2D
        size: { x: 8.0, y: 8.0 }
        layer: projectile
        mask: []
      - type: Velocity2D
        velocity: { x: 0.0, y: 0.0 }
      - type: Bounds2D
        min: { x: -936.0, y: -536.0 }
        max: { x: 936.0, y: 536.0 }
        behavior: hide
      - type: Lifetime
        seconds: 1.55
        outcome: return_to_pool
        pool: player-bullets

  - id: bullet-02
    name: playground-2d-asteroids-bullet-02
    tags: [projectile, player-bullet]
    groups: [player-projectiles]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    properties: { damage: 1 }
    components: *bullet_components

  - id: bullet-03
    name: playground-2d-asteroids-bullet-03
