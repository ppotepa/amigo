  - id: asteroid-01
    name: playground-2d-asteroids-asteroid-01
    tags: [asteroid]
    groups: [asteroids]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    properties: &asteroid_properties
      asteroid_size: large
      score_value: 20
      radius: 32
      vertices: 10
    components: &asteroid_components
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -24.0, y: 0.0 }
          - { x: -12.0, y: 20.0 }
          - { x: 10.0, y: 22.0 }
          - { x: 25.0, y: 4.0 }
          - { x: 13.0, y: -21.0 }
          - { x: -14.0, y: -19.0 }
        stroke_color: "#E8E8E8FF"
        stroke_width: 1.8
        fill_color: "#00000000"
        z_index: 24.0
      - type: CircleCollider2D
        radius: 32.0
      - type: Velocity2D
        velocity: { x: 0.0, y: 0.0 }
      - type: Bounds2D
        min: { x: -930.0, y: -530.0 }
        max: { x: 930.0, y: 530.0 }
        behavior: wrap

  - id: asteroid-02
    name: playground-2d-asteroids-asteroid-02
    tags: [asteroid]
    groups: [asteroids]
    visible: false
    simulation_enabled: false
    collision_enabled: false
