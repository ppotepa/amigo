    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
        root:
          type: column
          id: root
          style:
            left: 0.0
            top: 168.0
            width: 1280.0
            height: 360.0
            padding: 0.0
            gap: 18.0
            background: "#00000000"
          children:
            - type: text
              id: title
              text: "GAME OVER"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 48.0
