version: 1
scene:
  id: game
  label: Asteroids
  description: Retro vector arcade Asteroids gameplay scene using generic pools, collision events, motion, bounds, lifetime, and state-bound UI.

collision_events:
  - id: bullet-hit-asteroid
    source:
      kind: pool
      value: player-bullets
    target:
      kind: tag
      value: asteroid
    event: asteroids.bullet_hit_asteroid
    once_per_overlap: true
  - id: ship-hit-asteroid
    source:
      kind: entity
      value: playground-2d-asteroids-ship
    target:
      kind: tag
      value: asteroid
    event: asteroids.ship_hit_asteroid
    once_per_overlap: false

entities:
  - id: controls
    name: playground-2d-asteroids-controls
    components:
      - type: InputActionMap
        id: gameplay
        active: true
        actions:
          ship.thrust:
            kind: axis
            positive: [ArrowUp, KeyW]
            negative: [ArrowDown, KeyS]
          ship.turn:
            kind: axis
            positive: [ArrowLeft, KeyA]
            negative: [ArrowRight, KeyD]
          ship.fire:
            kind: button
            pressed: [Space]
          game.confirm:
            kind: button
            pressed: [Enter, Space]
          game.restart:
            kind: button
            pressed: [KeyR]
          ui.back:
            kind: button
            pressed: [Escape]

  - id: ship-controller
    name: playground-2d-asteroids-ship-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: playing
        kind: freeflight_input_controller
        target: playground-2d-asteroids-ship
        input:
          thrust: ship.thrust
          turn: ship.turn

  - id: thrust-profile-controller
    name: playground-2d-asteroids-thrust-profile-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: playing
        kind: particle_profile_controller
        emitter: playground-2d-asteroids-main-thruster
        action: ship.thrust
        max_hold_seconds: 5.0
        phases:
          - id: warm-plasma-start
            start_seconds: 0.0
            end_seconds: 0.75
            velocity_mode: free
            clear_forces: true
            color_ramp:
              interpolation: linear_rgb
              stops:
                - { t: 0.0, color: "#FFF7C8FF" }
                - { t: 0.28, color: "#FFE35CFF" }
                - { t: 0.70, color: "#FF9C1ACC" }
                - { t: 1.0, color: "#3A180000" }
            spread_degrees:
              from: 4.8
              to: 3.2
              curve: { kind: smooth_step }
              noise_scale: 0.55
            shape_line:
              from: 5.0
              to: 14.0
              curve: { kind: smooth_step }
              noise_scale: 1.2

          - id: blue-plasma-tail
            start_seconds: 0.75
            end_seconds: 3.75
            velocity_mode: free
            clear_forces: true
            color_ramp:
              interpolation: linear_rgb
              stops:
                - { t: 0.0, color: "#FFFFFFFF" }
                - { t: 0.22, color: "#7AF0FFFF" }
                - { t: 0.62, color: "#246DFFFF" }
                - { t: 1.0, color: "#001A5500" }
            spread_degrees:
              from: 3.2
              to: 1.35
              curve: { kind: ease_out }
              noise_scale: 0.35
            shape_line:
              from: 14.0
              to: 64.0
              curve:
                kind: custom
                points:
                  - { t: 0.0, value: 0.0 }
                  - { t: 0.18, value: 0.12 }
                  - { t: 0.34, value: 0.32 }
                  - { t: 0.52, value: 0.68 }
                  - { t: 0.68, value: 1.0 }
                  - { t: 0.84, value: 0.62 }
                  - { t: 1.0, value: 0.42 }
              noise_scale: 2.8

          - id: compact-ion-pulse
            start_seconds: 3.75
            end_seconds: 5.0
            velocity_mode: free
            clear_forces: true
            color_ramp:
              interpolation: linear_rgb
              stops:
                - { t: 0.0, color: "#FFFFFFFF" }
                - { t: 0.24, color: "#B8FFF7FF" }
                - { t: 0.62, color: "#4C9CFFFF" }
                - { t: 1.0, color: "#00184000" }
            spread_degrees:
              from: 1.35
              to: 1.9
              curve: { kind: smooth_step }
              noise_scale: 0.22
            shape_line:
              from: 26.0
              to: 12.0
              curve: { kind: smooth_step }
              noise_scale: 1.6

  - id: shield-controller
    name: playground-2d-asteroids-shield-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: playing
        kind: freeflight_input_controller
        target: playground-2d-asteroids-ship-shield
        input:
          thrust: ship.thrust
          turn: ship.turn

  - id: ship-fire-controller
    name: playground-2d-asteroids-ship-fire-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: playing
        kind: projectile_fire_controller
        emitter: playground-2d-asteroids-ship
        source: playground-2d-asteroids-ship
        action: ship.fire
        cooldown: 0.16
        cooldown_id: fire
        audio: playground-2d-asteroids/audio/shot

  - id: playing-back-controller
    name: playground-2d-asteroids-playing-back-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: playing
        kind: scene_back_controller
        action: ui.back
        scene: main-menu

  - id: game-over-confirm-controller
    name: playground-2d-asteroids-game-over-confirm-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: game_over
        kind: scene_back_controller
        action: game.confirm
        scene: main-menu

  - id: game-over-back-controller
    name: playground-2d-asteroids-game-over-back-controller
    components:
      - type: Behavior
        enabled_when:
          state: game_mode
          equals: game_over
        kind: scene_back_controller
        action: ui.back
        scene: main-menu

  - id: camera
    name: playground-2d-asteroids-camera
    tags: [camera]
    components:
      - type: Camera2D
      - type: CameraFollow2D
        target: playground-2d-asteroids-ship
        offset: { x: 0.0, y: 0.0 }
        lerp: 0.085
        lookahead_velocity_scale: 0.35
        lookahead_max_distance: 180.0
        sway_amount: 18.0
        sway_frequency: 1.4

