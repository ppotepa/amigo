  - id: game-over
    name: playground-2d-asteroids-game-over
    tags: [ui, game-over]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
        root:
          type: column
          id: root
          style:
            left: 0.0
            top: 168.0
            width: 1280.0
            height: 360.0
            padding: 0.0
            gap: 18.0
            background: "#00000000"
          children:
            - type: text
              id: title
              text: "GAME OVER"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 48.0
                color: "#FFFFFFFF"
                align: center
            - type: text
              id: score
              text: "SCORE 000000"
              text_bind: final_score_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 24.0
                color: "#D8D8D8FF"
                align: center
            - type: text
              id: prompt
              text: "SPACE TO MENU"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 18.0
                color: "#AAAAAAFF"
                align: center

  - id: hud
    name: playground-2d-asteroids-hud
    tags: [ui, hud]
    visible: false
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: hud
        root:
          type: column
          id: root
          style:
            left: 24.0
            top: 18.0
            width: 360.0
            padding: 0.0
            gap: 4.0
            background: "#00000000"
          children:
            - type: text
              id: score
              text: "000000"
              text_bind: score_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                font_size: 24.0
                color: "#F8F8F8FF"
            - type: text
              id: lives
              text: "LIVES 3"
              text_bind: lives_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                font_size: 16.0
                color: "#D8D8D8FF"
            - type: text
              id: wave
              text: "WAVE 01"
              text_bind: wave_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                font_size: 16.0
                color: "#D8D8D8FF"

  - id: center-status
