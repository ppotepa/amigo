  - id: hud
    name: playground-2d-asteroids-hud
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: hud
        root:
          type: column
          id: root
          style:
            left: 20.0
            top: 20.0
            width: 336.0
            padding: 14.0
            gap: 8.0
            background: "#050A10CC"
            border_color: "#5A83A833"
            border_width: 1.0
            border_radius: 10.0
          children:
            - type: text
              id: title
              text: "PLAYGROUND 2D ASTEROIDS"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 308.0
                font_size: 20.0
                color: "#F0F6FFFF"
                fit_to_width: true
                word_wrap: true
            - type: row
              id: stats
              style:
                gap: 16.0
              children:
                - type: text
                  id: score
                  text: "Score: 0"
                  text_bind: score_text
                  font: playground-2d-asteroids/fonts/debug-ui
                  style:
                    font_size: 14.0
                    color: "#E5F0FFFF"
                - type: text
                  id: lives
                  text: "Lives: 3"
                  text_bind: lives_text
                  font: playground-2d-asteroids/fonts/debug-ui
                  style:
                    font_size: 14.0
                    color: "#FFD89CFF"
            - type: text
              id: wave
              text: "Wave: 1"
              text_bind: wave_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                font_size: 13.0
                color: "#9EE1FFFF"
            - type: text
              id: debug
              text: "THRUST: 0 | TURN: 0"
              text_bind: debug_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 308.0
                font_size: 12.0
                color: "#9FB1C4FF"
                word_wrap: true
            - type: text
              id: status
              text: "READY // SPACE TO FIRE"
              text_bind: status_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 308.0
                font_size: 14.0
                color: "#95E4CCFF"
                word_wrap: true
            - type: text
              id: controls
              text: "TURN: LEFT/RIGHT  THRUST: UP  BRAKE: DOWN  FIRE: SPACE  RESET: R"
