version: 1
scene:
  id: vector-preview
  label: Asteroids Vector Field
  description: Full-screen vector Asteroids playground using generic pools, selectors, collision events, and state-bound HUD text.

collision_events:
  - id: bullet-hit-asteroid
    source:
      kind: pool
      value: player-bullets
    target:
      kind: tag
      value: asteroid
    event: asteroids.bullet_hit_asteroid
    once_per_overlap: true
  - id: ship-hit-asteroid
    source:
      kind: entity
      value: playground-2d-asteroids-ship
    target:
      kind: tag
      value: asteroid
    event: asteroids.ship_hit_asteroid
    once_per_overlap: false

entities:
