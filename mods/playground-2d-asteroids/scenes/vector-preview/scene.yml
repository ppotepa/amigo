          - { x: 2400.0, y: -2400.0 }
          - { x: 2400.0, y: 2400.0 }
          - { x: -2400.0, y: 2400.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#000000FF"
        z_index: -220.0

