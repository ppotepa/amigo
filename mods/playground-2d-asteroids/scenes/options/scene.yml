version: 1
scene:
  id: options
  label: Asteroids Options
  description: Session-level options for the Asteroids mini-game.

entities:
  - id: controls
    name: playground-2d-asteroids-options-controls
    components:
      - type: InputActionMap
        id: options
        active: true
        actions:
          menu.up:
            kind: button
            pressed: [ArrowUp, KeyW]
          menu.down:
            kind: button
            pressed: [ArrowDown, KeyS]
          menu.confirm:
            kind: button
            pressed: [Enter, Space]
          menu.back:
            kind: button
            pressed: [Escape, Backspace]
      - type: Behavior
        kind: menu_navigation_controller
        index_state: option_index
        item_count: 2
        up_action: menu.up
        down_action: menu.down
        confirm_action: menu.confirm
        move_audio: playground-2d-asteroids/audio/menu-move
        confirm_audio: playground-2d-asteroids/audio/menu-select
        selected_color_prefix: option_color
        confirm_events:
          - asteroids.options.toggle-low
          - asteroids.options.back
      - type: Behavior
        kind: scene_back_controller
        action: menu.back
        scene: main-menu
      - type: EventPipeline
        id: back-to-menu
        topic: asteroids.options.back
        steps:
          - kind: transition_scene
            scene: main-menu

  - id: options
    name: playground-2d-asteroids-options
    tags: [ui, options]
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
        root:
          type: column
          id: root
          style:
            left: 0.0
            top: 0.0
            width: 1280.0
            height: 720.0
            padding: 0.0
            gap: 18.0
            background: "#000000FF"
          children:
            - type: spacer
              id: top-space
              style:
                width: 1280.0
                height: 218.0
            - type: text
              id: title
              text: "OPTIONS"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 46.0
                color: "#F8F8F8FF"
                align: center
            - type: text
              id: low
              text: "LOW: OFF"
              text_bind: option_low_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 26.0
                color: "#FFFFFFFF"
                align: center
            - type: text
              id: back
              text: "BACK"
              text_bind: option_back_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 26.0
                color: "#CCCCCCFF"
                align: center
            - type: text
              id: hint
              text: "LOW REDUCES ASTEROID COUNT AND SPEED"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 14.0
                color: "#AAAAAAFF"
                align: center
      - type: UiModelBindings
        bindings:
          - path: playground-2d-asteroids-options.root.low
            state: option_color.0
            kind: color
          - path: playground-2d-asteroids-options.root.back
            state: option_color.1
            kind: color
