version: 1
scene:
  id: options
  label: Asteroids Options
  description: Session-level options for the Asteroids mini-game.

entities:
  - id: options
    name: playground-2d-asteroids-options
    tags: [ui, options]
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
        root:
          type: column
          id: root
          style:
            left: 0.0
            top: 0.0
            width: 1280.0
            height: 720.0
            padding: 0.0
            gap: 18.0
            background: "#000000FF"
          children:
            - type: spacer
              id: top-space
              style:
                width: 1280.0
                height: 218.0
            - type: text
              id: title
              text: "OPTIONS"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 46.0
                color: "#F8F8F8FF"
                align: center
            - type: text
              id: low
              text: "LOW: OFF"
              text_bind: option_low_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 26.0
                color: "#FFFFFFFF"
                align: center
            - type: text
              id: back
              text: "BACK"
              text_bind: option_back_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 26.0
                color: "#CCCCCCFF"
                align: center
            - type: text
              id: hint
              text: "LOW REDUCES ASTEROID COUNT AND SPEED"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 14.0
                color: "#AAAAAAFF"
                align: center
