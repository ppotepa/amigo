version: 1
scene:
  id: main-menu
  label: Asteroids Main Menu
  description: Retro vector Asteroids title screen and scene router.

entities:
  - id: controls
    name: playground-2d-asteroids-main-menu-controls
    components:
      - type: InputActionMap
        id: main-menu
        active: true
        actions:
          menu.up:
            kind: button
            pressed: [ArrowUp, KeyW]
          menu.down:
            kind: button
            pressed: [ArrowDown, KeyS]
          menu.confirm:
            kind: button
            pressed: [Enter, Space]
      - type: Behavior
        kind: menu_navigation_controller
        index_state: menu_index
        item_count: 4
        up_action: menu.up
        down_action: menu.down
        confirm_action: menu.confirm
        move_audio: playground-2d-asteroids/audio/menu-move
        confirm_audio: playground-2d-asteroids/audio/menu-select
        selected_color_prefix: menu_color
        confirm_events:
          - asteroids.menu.start
          - asteroids.menu.options
          - asteroids.menu.highscores
          - asteroids.menu.quit
      - type: EventPipeline
        id: start-game
        topic: asteroids.menu.start
        steps:
          - kind: transition_scene
            scene: game
      - type: EventPipeline
        id: open-options
        topic: asteroids.menu.options
        steps:
          - kind: transition_scene
            scene: options
      - type: EventPipeline
        id: open-highscores
        topic: asteroids.menu.highscores
        steps:
          - kind: transition_scene
            scene: highscores
      - type: EventPipeline
        id: quit-unavailable
        topic: asteroids.menu.quit
        steps:
          - kind: set_state
            key: status_text
            value: QUIT UNAVAILABLE

  - id: main-menu
    name: playground-2d-asteroids-main-menu
    tags: [ui, menu]
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
        root:
          type: column
          id: root
          style:
            left: 0.0
            top: 0.0
            width: 1280.0
            height: 720.0
            padding: 0.0
            gap: 18.0
            background: "#000000FF"
          children:
            - type: spacer
              id: top-space
              style:
                width: 1280.0
                height: 190.0
            - type: text
              id: title
              text: "ASTEROIDS"
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 56.0
                color: "#F8F8F8FF"
                align: center
            - type: text
              id: start
              text: "START"
              text_bind: menu_start_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 28.0
                color: "#FFFFFFFF"
                align: center
            - type: text
              id: options
              text: "OPTIONS"
              text_bind: menu_options_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 28.0
                color: "#CCCCCCFF"
                align: center
            - type: text
              id: highscores
              text: "HIGHSCORES"
              text_bind: menu_highscores_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 28.0
                color: "#CCCCCCFF"
                align: center
            - type: text
              id: quit
              text: "QUIT"
              text_bind: menu_quit_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 28.0
                color: "#CCCCCCFF"
                align: center
            - type: text
              id: status
              text: "READY"
              text_bind: status_text
              font: playground-2d-asteroids/fonts/debug-ui
              style:
                width: 1280.0
                font_size: 16.0
                color: "#AAAAAAFF"
                align: center
      - type: UiModelBindings
        bindings:
          - path: playground-2d-asteroids-main-menu.root.start
            state: menu_color.0
            kind: color
          - path: playground-2d-asteroids-main-menu.root.options
            state: menu_color.1
            kind: color
          - path: playground-2d-asteroids-main-menu.root.highscores
            state: menu_color.2
            kind: color
          - path: playground-2d-asteroids-main-menu.root.quit
            state: menu_color.3
            kind: color
