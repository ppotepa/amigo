id = "playground-2d-asteroids"
name = "Asteroids"
version = "0.1.0"
description = "Retro vector arcade mini-game built from reusable 2D engine features."
authors = ["Amigo Engine Team"]
dependencies = ["core"]
capabilities = ["rendering_2d", "vector_2d", "screen_space_ui", "audio_api", "generated_audio"]

[scripting]
mod_script_mode = "disabled"

[[scenes]]
id = "main-menu"
label = "Asteroids Menu"
description = "Retro vector Asteroids main menu."
path = "scenes/main-menu"
launcher_visible = true

[[scenes]]
id = "options"
label = "Options"
description = "Session options for the Asteroids mini-game."
path = "scenes/options"
launcher_visible = false

[[scenes]]
id = "highscores"
label = "High Scores"
description = "Session highscores for the Asteroids mini-game."
path = "scenes/highscores"
launcher_visible = false

[[scenes]]
id = "game"
label = "Play Asteroids"
description = "Retro vector Asteroids gameplay."
path = "scenes/game"
launcher_visible = false

[[scenes]]
id = "vector-preview"
label = "Legacy Asteroids Preview"
description = "Compatibility alias that routes to the Asteroids main menu."
path = "scenes/vector-preview"
launcher_visible = false
