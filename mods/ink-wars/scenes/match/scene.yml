version: 1
scene:
  id: match
  label: INK WARS Match
  description: Single-player first vertical slice using the INK WARS dirt tileset.

entities:
  - id: controls
    name: ink-wars-match-controls
    components:
      - type: InputActionMap
        id: gameplay
        active: true
        actions:
          player.move:
            kind: axis
            positive: [ArrowRight, KeyD]
            negative: [ArrowLeft, KeyA]
          player.jump_pressed:
            kind: button
            pressed: [Space, ArrowUp, KeyW]
          player.jump_down:
            kind: button
            pressed: [Space, ArrowUp, KeyW]
          player.aim_up:
            kind: button
            pressed: [KeyQ]
          player.aim_down:
            kind: button
            pressed: [KeyE]
          ui.back:
            kind: button
            pressed: [Escape]
      - type: Behavior
        kind: scene_transition_controller
        action: ui.back
        scene: menu

  - id: camera
    name: ink-wars-match-camera
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Camera2D
      - type: CameraFollow2D
        target: ink-wars-player-1
        offset: { x: 0.0, y: -48.0 }
        lerp: 0.22
        lookahead_velocity_scale: 0.18
        lookahead_max_distance: 120.0

  - id: paper-background
    name: ink-wars-match-paper-background
    transform2:
      translation: { x: 0.0, y: 0.0 }
    components:
      - type: Sprite2D
        texture: ink-wars/images/notebook-paper-16x9
        size: { x: 3072.0, y: 1728.0 }
        z_index: -140.0

  - id: paper-wash
    name: ink-wars-match-paper-wash
    components:
      - type: VectorShape2D
        kind: polygon
        points:
          - { x: -1536.0, y: -864.0 }
          - { x: 1536.0, y: -864.0 }
          - { x: 1536.0, y: 864.0 }
          - { x: -1536.0, y: 864.0 }
        stroke_color: "#00000000"
        stroke_width: 0.0
        fill_color: "#FFFDF522"
        z_index: -139.0

