              accent: "#123D9AFF"
              accent_text: "#FAF8EEFF"
              danger: "#123D9AFF"
              warning: "#2454B0CC"
              success: "#123D9AFF"

  - id: ui
    name: ink-wars-menu-ui
    visible: true
    simulation_enabled: false
    collision_enabled: false
    components:
      - type: UiModelBindings
        bindings:
          - path: ink-wars-menu-ui.root
            state: active_theme
            kind: theme
          - path: ink-wars-menu-ui.root.status
            state: status_text
            kind: text
      - type: UiDocument
        target:
          type: screen-space
          layer: menu
          viewport:
            width: 1280.0
            height: 720.0
            scaling: fit
        root:
          type: column
          id: root
          style_class: root
          style:
            left: 0.0
            top: 0.0
            width: 1280.0
            height: 720.0
            padding: 76.0
            gap: 14.0
          children:
            - type: text
              id: kicker
              text: "INK WARS LAB"
              font: ink-wars/fonts/notebook-ink
              style_class: text_muted
              style:
                width: 1128.0
                height: 30.0
                font_size: 18.0
                align: center
            - type: text
              id: title
              text: "INK WARS"
              font: ink-wars/fonts/notebook-ink
              style_class: text_title
              style:
                width: 1128.0
                height: 82.0
                font_size: 62.0
                align: center
            - type: text
              id: subtitle
              text: "BLUE PEN DUEL ON PAPER"
              font: ink-wars/fonts/notebook-ink
              style_class: text_muted
              style:
                width: 1128.0
                height: 34.0
                font_size: 20.0
                align: center
            - type: spacer
              id: title-gap
              style:
                width: 1128.0
                height: 24.0
            - type: button
              id: start-match
              text: "1  PLAY"
              font: ink-wars/fonts/notebook-ink
              style_class: button_primary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: ink-wars.menu.start-match
            - type: button
              id: terrain-lab
              text: "2  SURFACE LAB"
              font: ink-wars/fonts/notebook-ink
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: ink-wars.menu.terrain-lab
            - type: button
              id: split-lab
              text: "3  CAMERA LAB"
              font: ink-wars/fonts/notebook-ink
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
                event: ink-wars.menu.split-lab
            - type: button
              id: weapon-lab
              text: "4  WEAPON LAB"
              font: ink-wars/fonts/notebook-ink
              style_class: button_secondary
              style:
                width: 520.0
                height: 52.0
              on_click:
