version: 1
scene:
  id: menu
  label: INK WARS Menu
  description: Main menu for the INK WARS notebook terrain duel.

entities:
  - id: controls
    name: ink-wars-menu-controls
    components:
      - type: InputActionMap
        id: menu
        active: true
        actions:
          menu.start_match:
            kind: button
            pressed: [Digit1, Key1, "1"]
          menu.open_terrain_lab:
            kind: button
            pressed: [Digit2, Key2, "2"]
          menu.open_split_lab:
            kind: button
            pressed: [Digit3, Key3, "3"]
          menu.open_weapon_lab:
            kind: button
            pressed: [Digit4, Key4, "4"]
          ui.back:
            kind: button
            pressed: [Escape]
      - type: EventPipeline
        id: start-match
        topic: ink-wars.menu.start-match
        steps:
          - kind: transition_scene
            scene: match
      - type: EventPipeline
        id: terrain-lab-placeholder
        topic: ink-wars.menu.terrain-lab
        steps:
          - kind: set_state
            key: status_text
            value: TERRAIN LAB WILL USE DESTRUCTIBLE SURFACES
      - type: EventPipeline
        id: split-lab-placeholder
        topic: ink-wars.menu.split-lab
        steps:
          - kind: set_state
            key: status_text
            value: SPLIT SCREEN LAB NOT IMPLEMENTED YET
      - type: EventPipeline
        id: weapon-lab-placeholder
        topic: ink-wars.menu.weapon-lab
        steps:
          - kind: set_state
            key: status_text
            value: WEAPON LAB NOT IMPLEMENTED YET
      - type: EventPipeline
        id: back-placeholder
        topic: ink-wars.menu.back
        steps:
          - kind: set_state
            key: status_text
            value: BACK UNAVAILABLE FROM ROOT MENU
      - type: Behavior
        kind: scene_transition_controller
        action: menu.start_match
        scene: match
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_terrain_lab
        key: status_text
        value: TERRAIN LAB WILL USE DESTRUCTIBLE SURFACES
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_split_lab
        key: status_text
        value: SPLIT SCREEN LAB NOT IMPLEMENTED YET
      - type: Behavior
        kind: set_state_on_action_controller
        action: menu.open_weapon_lab
        key: status_text
        value: WEAPON LAB NOT IMPLEMENTED YET
      - type: Behavior
        kind: set_state_on_action_controller
        action: ui.back
        key: status_text
        value: BACK UNAVAILABLE FROM ROOT MENU

  - id: camera
    name: ink-wars-menu-camera
    components:
      - type: Camera2D

  - id: menu-paper-background
    name: ink-wars-menu-paper-background
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: ink-wars/images/notebook-paper-16x9
        size: { x: 1280.0, y: 720.0 }
        z_index: -130.0

  - id: menu-paper-wash
    name: ink-wars-menu-paper-wash
    components:
