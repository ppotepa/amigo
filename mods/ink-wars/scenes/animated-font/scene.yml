version: 1

scene:
  id: animated-font
  label: INK WARS Animated Font Lab
  description: Isolated animated bitmap font lab for the INK WARS notebook UI.

imports:
  scripts:
    - scene.rhai

entities:
  - id: camera
    name: animated-font-camera
    components:
      - type: Camera2D

  - id: paper-background
    name: animated-font-paper-background
    transform2:
      translation: { x: 0.0, y: 0.0 }
      rotation_radians: 0.0
      scale: { x: 1.0, y: 1.0 }
    components:
      - type: Sprite2D
        texture: ink-wars/spritesheets/notebook-paper-16x9
        size: { x: 1280.0, y: 720.0 }
        z_index: -120.0

  - id: paper-wash
    name: animated-font-paper-wash
    components:
